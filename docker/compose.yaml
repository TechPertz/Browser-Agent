# Self-hosted Langfuse + its Postgres, plus the mock Workday service.
# Single-command local stack:
#   docker compose -f docker/compose.yaml up -d
#
# After up: open http://localhost:3000 to create a Langfuse project, copy
# the public/secret keys into .env, then flip
#   observability.langfuse.enabled: true
# in config/profile.yaml.

services:
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: andera-dev-not-a-real-secret
      SALT: andera-dev-salt
      TELEMETRY_ENABLED: "false"
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"

volumes:
  langfuse_db:
