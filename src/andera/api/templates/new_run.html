{% extends "base.html" %}
{% set active = "new" %}
{% block title %}New run · Andera{% endblock %}
{% block content %}
<h2>New run</h2>
<div class="card" style="max-width: 640px;">
  <form hx-post="/ui/runs/create" hx-swap="outerHTML">
    <label>Task file</label>
    <input name="task_path" value="config/tasks/03-github-issue.yaml" required />
    <label>Input file (csv / jsonl / json / xlsx)</label>
    <input name="input_path" placeholder="runs/inputs/issues.csv" required />
    <label>Max samples (optional)</label>
    <input name="max_samples" type="number" min="1" placeholder="leave blank for all rows" />
    <div style="margin-top: 24px;">
      <button type="submit">Start run</button>
    </div>
    {% if error %}<p class="verdict-fail" style="margin-top: 16px;">{{ error }}</p>{% endif %}
  </form>
</div>
{% endblock %}
